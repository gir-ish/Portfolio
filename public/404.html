<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Girish</title>
    <script>
      // GitHub Pages SPA redirect
      // When a direct URL is hit (refresh/share), GitHub serves this 404.html.
      // We encode the full path into a query param and redirect to the root,
      // where index.html will decode it and restore the route via history API.
      var segmentCount = 1; // matches the depth of the repo base path (/Portfolio/)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
